<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LU Campus Map</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <main class="login-page">

    <div class="login-card">

      <!-- Logo & School Name -->
      <div class="login-logo-area">
        <div class="login-logo-circle">
          <img src="assets/images/lu-logo.png" alt="LU Logo" />
        </div>
        <div>
          <div class="login-school-name">Laguna University</div>
          <div class="login-system-name">Interactive Campus Map System</div>
        </div>
      </div>

      <div class="login-divider"></div>

      <!-- Login Form -->
      <form class="login-form" id="loginForm" onsubmit="return false;">

        <!-- Error message (hidden by default) -->
        <div class="login-error hidden" id="loginError" role="alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginErrorMsg">Invalid email or password.</span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="emailInput">Email Address</label>
          <input
            class="form-input"
            type="email"
            id="emailInput"
            name="email"
            placeholder="you@laguna.edu.ph"
            autocomplete="email"
            required
          />
        </div>

        
        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="passwordInput">Password</label>
          <input
            class="form-input"
            type="password"
            id="passwordInput"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>

        <!-- Submit -->
        <button
          class="btn-login"
          type="submit"
          id="loginBtn"
        >
          <span id="loginBtnText">Sign In</span>
        </button>

      </form>

    </div><!-- /.login-card -->

  </main>


  <!-- DEV MOCK — remove once backend loginUser() is connected -->
  <!-- Test accounts:
       admin@lu.edu.ph      / admin123  → admin/dashboard.html
       superadmin@lu.edu.ph / super123  → superadmin/dashboard.html
  -->
  <script>
    if (typeof loginUser === 'undefined') {
      window.loginUser = function(email, password) {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            if (email === 'admin@lu.edu.ph' && password === 'admin123')
              resolve({ role: 'admin', name: 'Juan Dela Cruz' });
            else if (email === 'superadmin@lu.edu.ph' && password === 'super123')
              resolve({ role: 'superadmin', name: 'Pedro Reyes' });
            else
              reject(new Error('Invalid email or password.'));
          }, 700);
        });
      };
    }
  </script>
  <script src="js/pages/login.js"></script>

</body>
</html>
