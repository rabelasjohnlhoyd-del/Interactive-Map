<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin Dashboard — LU Campus Map</title>

  <!-- Leaflet.js (provided per instructions) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="app-shell map-page">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <img src="../assets/images/lu-logo.png" alt="LU Logo" />
      </div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">Laguna University</span>
        <span class="sidebar-brand-sub">Campus Map</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="sidebar-nav-label">Navigation</span>

      <a href="dashboard.html" class="sidebar-link active">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="3 11 22 2 13 21 11 13 3 11"/>
          </svg>
        </span>
        Map View
      </a>

      <a href="buildings.html" class="sidebar-link">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </span>
        All Buildings
      </a>

      <a href="archives.html" class="sidebar-link">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/>
            <line x1="10" y1="12" x2="14" y2="12"/>
          </svg>
        </span>
        Archives
      </a>

      <a href="manage-admins.html" class="sidebar-link">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        Manage Admins
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-footer-user">
        <div class="sidebar-avatar" id="sidebarAvatar">S</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarUserName">Super Admin</div>
          <div class="sidebar-user-role">Super Administrator</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logoutUser()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>

  </aside><!-- /.sidebar -->


  <!-- ========== MAIN CONTENT ========== -->
  <div class="main-content">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="header-breadcrumb">
          <span>Super Admin</span>
          <span class="sep">›</span>
          <span class="current">Map View</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div class="header-user">
          <div class="header-avatar" id="headerAvatar">S</div>
          <div>
            <div class="header-user-name" id="headerUserName">Super Admin</div>
            <div class="header-user-role">Super Administrator</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Map (view-only — no add marker button) -->
    <div class="page-wrapper">
      <div id="map"></div>
    </div>

  </div><!-- /.main-content -->


  <!-- ========== INFO PANEL ========== -->
  <div class="info-panel" id="infoPanel">

    <div class="info-panel-header">
      <span class="info-panel-title" id="infoPanelTitle">Building Name</span>
      <button class="info-panel-close" onclick="closeInfoPanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="info-panel-cover-placeholder" id="infoPanelCoverPlaceholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <img class="info-panel-cover hidden" id="infoPanelCover" src="" alt="" />

    <div class="info-panel-body" id="infoPanelBody">
      <!-- Content injected by openInfoPanel() -->
    </div>

  </div><!-- /.info-panel -->


  <script src="../js/pages/superadmin-dashboard.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/components/infoPanel.js"></script>

  <script>
    // DEV fallback — logoutUser() stub so the button doesn't throw
    // before the backend script loads. Backend overrides this.
    if (typeof logoutUser === 'undefined') {
      window.logoutUser = function () {
        console.warn('[DEV] logoutUser() not yet connected.');
      };
    }
    // NOTE: setHeaderName(), openInfoPanel(), closeInfoPanel(),
    // toggleFloor(), toggleTheme() are all defined in
    // js/pages/superadmin-dashboard.js (loaded above).
    // No need to redefine them here.
  </script>

</body>
</html>
